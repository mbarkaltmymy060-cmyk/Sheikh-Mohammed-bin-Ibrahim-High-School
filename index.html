<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثانوية الشيخ محمد بن إبراهيم - لوحة الشرف</title>
    <style>
        /* تنسيقات عامة للموقع */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            color: #333;
            overflow-x: hidden;
        }

        /* تنسيق الهيدر (رأس الصفحة) */
        header {
            background: linear-gradient(135deg, #1a5276 0%, #2c3e50 100%);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
            z-index: 10;
        }

        /* تنسيق الشعار داخل الهيدر */
        .school-logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 15px;
            background-color: white;
            padding: 8px;
            border-radius: 50%; /* تحويل الشعار لشكل دائري أنيق */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .school-logo:hover {
            transform: scale(1.05);
        }

        header h1 { 
            margin: 5px 0; 
            font-size: 2.2rem; 
            font-weight: 700;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        header p {
            margin: 0;
            font-size: 1.1rem;
            color: #d4e6f1;
            letter-spacing: 1px;
        }

        /* حاوية قسم الخلفية المحدثة بالصورة الجديدة المرفقة */
        .hero-background {
            position: relative;
            width: 100%;
            min-height: 750px;
            /* استدعاء الصورة الجديدة المرفقة وتوسيطها بشكل فخم */
            background-image: url('DSC00626.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* تغطية المساحة بالكامل لتعطي عمقاً للتصميم */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* إضافة طبقة تظليل خفيفة فوق الصورة لإبراز المحتوى النصي وبطاقة الخريجين */
        .hero-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2); /* تظليل خفيف جداً لمنح النص تبايناً أعلى */
            z-index: 1;
        }

        /* حاوية المحتوى الرئيسي فوق الصورة */
        .container {
            width: 100%;
            max-width: 800px;
            margin: auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2; /* بقاء الكرت فوق طبقة التظليل والصورة */
        }

        /* تنسيق كرت قسم زر الخريجين المطور */
        .graduates-section {
            text-align: center;
            background: rgba(255, 255, 255, 0.95); 
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(26, 82, 118, 0.2);
            border-top: 6px solid #1a5276;
            backdrop-filter: blur(10px); /* تأثير ضبابي زجاجي فخم */
        }

        .graduates-section h2 { 
            color: #1a5276; 
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
        }
        
        .graduates-section p {
            color: #566573;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* تصميم زر عرض الأسماء الفخم */
        .btn-graduates {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #27ae60 0%, #219653 100%);
            color: white;
            padding: 16px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 35px;
            box-shadow: 0 5px 20px rgba(39, 174, 96, 0.4);
            transition: all 0.3s ease;
        }

        .btn-graduates:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.6);
        }

        /* ألبوم صور خاص يظهر فقط على الجوال لترتيب العرض على الشاشات الصغيرة */
        .mobile-gallery {
            display: none;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 30px;
            padding: 0 10px;
        }

        .mobile-gallery img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 3px white solid;
        }

        /* التذييل (Footer) */
        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: #2c3e50;
            color: white;
            font-size: 0.95rem;
            position: relative;
            z-index: 10;
        }

        /* الشاشات المتوسطة والصغيرة (الهواتف والتابلت) */
        @media (max-width: 992px) {
            /* تعديل الخلفية على الجوال لتكون مريحة وبدون تداخل مع النصوص */
            .hero-background {
                background-image: none;
                min-height: auto;
                padding: 40px 0;
            }
            
            .hero-background::before {
                display: none;
            }
            
            .container {
                padding: 20px;
            }

            .graduates-section {
                padding: 35px 20px;
            }

            header h1 {
                font-size: 1.8rem;
            }

            /* عرض الصورة بوضوح تام وكامل أسفل كرت الخريجين لمستخدمي الجوال */
            .mobile-gallery {
                display: grid;
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="kWSHdkvb_400x400.jpeg" alt="شعار ثانوية الشيخ محمد بن إبراهيم" class="school-logo">
        <h1>ثانوية الشيخ محمد بن إبراهيم</h1>
        <p>خريجي ثالث ثانوي دفعة 45</p>
                <p>1446 - 2026</p>

    </header>

    <div class="hero-background">
        <div class="container">

            <section class="graduates-section">
                <h2>خريجو المدرسة الفخورين بها</h2>
                <p>يسعدنا ويشرفنا أن نضع بين أيديكم لوحة تضم اسامي من طلابنا الخريجين. اضغط على الزر أدناه للاطلاع على قائمة المتخرجين للعام الدراسي.</p>
                <a href="graduates.html" class="btn-graduates">🎓 عرض أسماء المتخرجين</a>
            </section>

            <div class="mobile-gallery">
                <img src="DSC00626.jpg" alt="حفل تخرج ثانوية الشيخ محمد بن إبراهيم">
            </div>

        </div>
    </div>

    <footer>
        <p>إعداد الطالب مبارك بدر الوهيبي</p>
    </footer>

</body>
</html>
